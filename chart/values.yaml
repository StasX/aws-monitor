replicas: 1

ingress:
  enabled: true
  path: /

pod:
  targetPort: 5001
  port: 80

awsSecretName: aws-credentials

resources:
  requests:
    cpu: "200m"
    memory: "256Mi"

  limits:
    cpu: "500m"
    memory: "512Mi"

hpa:
  enabled: true
  maxReplicas: 10
  avgCPUUtilization: 50
  avgMemoryUtilization: 50