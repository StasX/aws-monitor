replicas: 1

ingress:
  enabled: true
  path: /

pod:
  targetPort: 5001
  port: 80

awsSecretName: aws-monitor-secret

externalSecret:
  enabled: true
  secretStoreName: aws-secret-store
  region: us-east-1
  awsSecretManagerName: aws-monitor

resources:
  requests:
    cpu: "200m"
    memory: "256Mi"

  limits:
    cpu: "500m"
    memory: "512Mi"

hpa:
  enabled: true
  maxReplicas: 10
  avgCPUUtilization: 50
  avgMemoryUtilization: 50