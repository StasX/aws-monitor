{{ if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}-ing
  labels:
  {{- include "exam.labels" . | nindent 4}}
spec:
  ingressClassName: traefik
  rules:
    - http:
       paths:
        - path: {{ .Values.path }}
          pathType: Prefix
          backend:
            service:
              name: {{ .Release.Name }}-svc
              port:
                 number: {{ .Values.pod.port }}
{{ end }}
