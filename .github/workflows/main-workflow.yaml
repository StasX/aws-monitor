name: main-workflow

on:
  push:
    branches: [main]
    paths-ignore:
      - "README.md"
      - ".github/workflows/**"
      - "Jenkinsfile"
      - "jenkinsfile"
      - ".app-info.json"

permissions:
  contents: read

jobs:
  app-information-extraction:
    runs-on: ubuntu-latest
    outputs:
      app_name: ${{ steps.parse.outputs.app_name }}
      image_name: ${{ steps.parse.outputs.image_name }}
      app_version: ${{ steps.parse.outputs.app_version }}
      app_description: ${{ steps.parse.outputs.app_description }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          sparse-checkout: |
            .app-info.json
      - name: Export app information
        id: parse
        run: |
          APP_NAME=$(jq -r '.name' .app-info.json)
          IMAGE_NAME=$(echo "$APP_NAME" | tr '[:upper:]' '[:lower:]')
          APP_VERSION=$(jq -r '.version' .app-info.json)
          APP_DESCRIPTION=$(jq -r '.description' .app-info.json)

          # Write variables directly to GitHub Output context
          {
            echo "app_name=${APP_NAME}"
            echo "image_name=${IMAGE_NAME}"
            echo "app_version=${APP_VERSION}"
            echo "app_description=${APP_DESCRIPTION}"
          } >> "$GITHUB_OUTPUT"

  #------------------------------------------------------------------------------

  bandit-testing:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v6
        with:
          sparse-checkout: |
            ./

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install Bandit
        run: pip install bandit

      - name: Run Bandit
        run: bandit -r ./ -x ./.venv,./venv

  #------------------------------------------------------------------------------

  checkov-testing:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v6
        with:
          sparse-checkout: |
            chart
            Dockerfile

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install Checkov
        run: pip install checkov
      - name: Run Checkov on Helm Chart
        run: checkov -d ./chart --framework helm
      - name: Run Checkov on Dockerfile
        run: checkov -f Dockerfile --framework dockerfile

  #------------------------------------------------------------------------------


  semgrep-testing:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install Semgrep
        run: pip install semgrep

      - name: Run Semgrep Scan
        run: |
          semgrep scan \
          --config=p/python \
          --config=p/dockerfile \
          --config=p/kubernetes \
          --config=p/github-actions \
          --metrics=off \
          --error

  #------------------------------------------------------------------------------

  docker:
    runs-on: ubuntu-latest
    environment: DOCKERHUB_USERNAME
    needs:
      [
        app-information-extraction,
        bandit-testing,
        checkov-testing,
        semgrep-testing,
      ]
    steps:
      - name: checkout
        uses: actions/checkout@v6

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker Image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          load: true
          tags: |
            ${{ vars.DOCKERHUB_USERNAME }}/${{ needs.app-information-extraction.outputs.image_name }}:${{ needs.app-information-extraction.outputs.app_version }}
            ${{ vars.DOCKERHUB_USERNAME }}/${{ needs.app-information-extraction.outputs.image_name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate Trivy Vulnerability Report
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: "image"
          output: trivy-report.json
          format: json
          scan-ref: ${{ vars.DOCKERHUB_USERNAME }}/${{ needs.app-information-extraction.outputs.image_name }}:${{ needs.app-information-extraction.outputs.app_version }}
          exit-code: 0

      - name: Upload Vulnerability Scan Results
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy-report.json
          retention-days: 30

      - name: Fail build on High/Criticial Vulnerabilities
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: "image"
          format: table
          scan-ref: ${{ vars.DOCKERHUB_USERNAME }}/${{ needs.app-information-extraction.outputs.image_name }}:${{ needs.app-information-extraction.outputs.app_version }}
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 1
          skip-setup-trivy: true

      - name: Push image to Docker Hub
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ${{ vars.DOCKERHUB_USERNAME }}/${{ needs.app-information-extraction.outputs.image_name }}:${{ needs.app-information-extraction.outputs.app_version }}
            ${{ vars.DOCKERHUB_USERNAME }}/${{ needs.app-information-extraction.outputs.image_name }}:latest
          cache-from: type=gha

  #------------------------------------------------------------------------------

  deployment:
    runs-on: ubuntu-latest
    needs: [app-information-extraction, docker]
    environment: DOCKERHUB_USERNAME
    steps:
      - name: checkout
        uses: actions/checkout@v6
        with:
          sparse-checkout: |
            chart

      - name: clone-gitops-repo
        uses: actions/checkout@v6
        with:
          repository: "StasX/argo-gitops"
          ref: main
          path: argo-gitops
          token: ${{ secrets.GITOPS_TOKEN }}

      - name: deploy
        run: |
          helm template test ./chart \
          --set-string pod.image="${{ vars.DOCKERHUB_USERNAME }}/${{ needs.app-information-extraction.outputs.image_name }}" \
          --set-string pod.tag="${{ needs.app-information-extraction.outputs.app_version }}" \
          --set-string pod.name="${{ needs.app-information-extraction.outputs.app_name }}" \
          --set secret.enabled=false > argo-gitops/application.yaml
          git config --global user.name ${{ secrets.GH_USER }}
          git config --global user.email ${{ secrets.GH_MAIL }}
          git -C argo-gitops add application.yaml
          git -C argo-gitops commit -m "Update application.yaml"
          git -C argo-gitops push origin main --force

  #------------------------------------------------------------------------------

  upgrade-version:
    runs-on: ubuntu-latest
    needs: [app-information-extraction, deployment]
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          sparse-checkout: |
            .app-info.json

      - name: Upgrade Minor Version
        run: |
          old_version="${{ needs.app-information-extraction.outputs.app_version }}"
          new_version=$(awk -F. '{printf "%d.%d.%d", $1, $2, $3+1}' <<< "$old_version")
          cat <<EOF > .app-info.json
          {
            "name": "${{ needs.app-information-extraction.outputs.app_name }}",
            "version": "$new_version",
            "description": "${{ needs.app-information-extraction.outputs.app_description }}"
          }
          EOF
                  git config --global user.name "${{ secrets.GH_USER }}"
          git config --global user.email "${{ secrets.GH_MAIL }}"
          git add .app-info.json
          git commit -m "Update next app version in .app-info.json"
          git push origin main
