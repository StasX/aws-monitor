name: main-workflow

on:
  push:
  workflow_dispatch:

env:
  APP_NAME: hello-newapp

jobs:
  checkout-and-dockerize:
    runs-on: ubuntu-latest
    environment: DOCKERHUB_USERNAME

    steps:
    - name: checkout
      uses: actions/checkout@v6
      with:
        sparse-checkout: |
          .github
          chart
    - name: Login to Docker Hub
      uses: docker/login-action@v4
      with:
        username: ${{ vars.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
    
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4
    
    - name: Build and push
      uses: docker/build-push-action@v7
      with:
        context: .
        push: true
        tags: |
          ${{ vars.DOCKERHUB_USERNAME }}/${{ env.APP_NAME }}:${{ github.run_number }}
          ${{ vars.DOCKERHUB_USERNAME }}/${{ env.APP_NAME }}:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max
  deployment:
    runs-on: ubuntu-latest
    needs: checkout-and-dockerize
    steps:
    - name: checkout
      uses: actions/checkout@v6
      with:
        sparse-checkout: |
          .github
          chart

    - name: clone-gitops-repo
      uses: actions/checkout@v6
      with:
        repository: "StasX/argo-gitops"
        ref: main
        path: argo-gitops
    - name: helm-template
      run: |
        helm template test ./chart  --set secret.enabled=false > argo-gitops/application.yaml
        git config --global user.name ${{ secrets.GH_USER }}
        git config --global user.email ${{ secrets.GH_MAIL }}
        git -C argo-gitops add application.yaml
        git -C argo-gitops commit -m "Update application.yaml"
        git -C argo-gitops push origin main
