apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-deployment
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}
    spec:
      containers:
        - name: {{ .Values.pod.name }}
          image: {{ .Values.pod.image.name }}:{{ .Values.image.tag }}
          ports:
            - containerPort: {{ .Values.pod.target_port }}
          
          env:
            - name: AWS_ACCESS_KEY_ID
              value: "{{ .Values.aws.accessKey }}"
            - name: AWS_SECRET_ACCESS_KEY
              value: "{{ .Values.aws.secretKey }}"