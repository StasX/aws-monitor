apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-deploy
spec:
  selector: 
    matchLabels:
      app: {{ .Release.Name }}
      {{- include "exam.labels" . | nindent 6}}
  replicas: {{ .Values.replicas }}
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}
        {{- include "exam.labels" . | nindent 8}}
    spec:
      containers:
      - name: {{ .Release.Name }}
        image: {{ .Values.pod.image}}:{{ .Values.pod.tag }}
        ports:
        - containerPort: {{ .Values.pod.targetPort }}
        env:
        - name: AWS_ACCESS_KEY_ID
          value: {{ .Values.AWS_ACCESS_KEY_ID }}
        - name: AWS_SECRET_ACCESS_KEY
          value: {{ .Values.AWS_SECRET_ACCESS_KEY }}