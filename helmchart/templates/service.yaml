apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-service
spec:
  {{ if .Values.ingress.enabled }}
  type: ClusterIP
  {{ else }}
  type: LoadBalancer
  {{ end }}
  selector:
    app: {{ .Release.Name}}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.pod.targetPort }}